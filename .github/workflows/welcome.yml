name: Welcome New Contributors

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: >
            👋 Welcome to TermMind! Thank you for opening your first issue.
            We appreciate your contribution. A maintainer will review it shortly.
            In the meantime, please make sure you've included enough context
            (steps to reproduce, expected behavior, environment details).
          pr-message: >
            👋 Welcome to TermMind! Thank you for your first pull request!
            We appreciate your contribution. Please make sure:
            - Tests pass (`pytest tests/ -q`)
            - Linting passes (`ruff check termmind/`)
            - You've described your changes clearly
            A maintainer will review your PR soon.
