core:
  - changed-files:
      - any-glob-to-any-file: "termmind/**"

tests:
  - changed-files:
      - any-glob-to-any-file: "tests/**"

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.md"
          - "docs/**"

ci:
  - changed-files:
      - any-glob-to-any-file: ".github/workflows/**"

docker:
  - changed-files:
      - any-glob-to-any-file:
          - "Dockerfile"
          - "docker-compose.yml"

config:
  - changed-files:
      - any-glob-to-any-file:
          - "pyproject.toml"
          - ".editorconfig"
