<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#bc8cff"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#238636"/>
      <stop offset="100%" stop-color="#2ea043"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d29922"/>
      <stop offset="100%" stop-color="#e3b341"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1f6feb"/>
      <stop offset="100%" stop-color="#388bfd"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" rx="12" fill="url(#bg)"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="url(#accent)" font-size="18" font-weight="700">TermMind Architecture</text>

  <!-- User Input -->
  <rect x="310" y="55" width="180" height="40" rx="8" fill="#21262d" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="400" y="80" text-anchor="middle" fill="#c9d1d9" font-size="13" font-weight="600">User Input</text>

  <!-- Arrow down -->
  <line x1="400" y1="95" x2="400" y2="120" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#58a6ff"/></marker></defs>

  <!-- CLI Layer -->
  <rect x="220" y="120" width="360" height="50" rx="8" fill="#21262d" stroke="url(#accent)" stroke-width="1.5"/>
  <text x="400" y="150" text-anchor="middle" fill="#c9d1d9" font-size="13" font-weight="600">CLI (Click + prompt_toolkit + Rich)</text>

  <!-- Arrow splits -->
  <line x1="310" y1="170" x2="160" y2="205" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <line x1="400" y1="170" x2="400" y2="205" stroke="#d29922" stroke-width="1.5" marker-end="url(#arrowO)"/>
  <line x1="490" y1="170" x2="640" y2="205" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <defs><marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#3fb950"/></marker></defs>
  <defs><marker id="arrowO" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#d29922"/></marker></defs>

  <!-- Slash Commands box -->
  <rect x="40" y="205" width="240" height="40" rx="8" fill="#21262d" stroke="url(#green)" stroke-width="1.5"/>
  <text x="160" y="230" text-anchor="middle" fill="#c9d1d9" font-size="12" font-weight="600">Slash Commands (30+)</text>

  <!-- Context Builder box -->
  <rect x="290" y="205" width="220" height="40" rx="8" fill="#21262d" stroke="url(#orange)" stroke-width="1.5"/>
  <text x="400" y="230" text-anchor="middle" fill="#c9d1d9" font-size="12" font-weight="600">Context Builder</text>

  <!-- Provider Layer box -->
  <rect x="520" y="205" width="240" height="40" rx="8" fill="#21262d" stroke="url(#blue)" stroke-width="1.5"/>
  <text x="640" y="230" text-anchor="middle" fill="#c9d1d9" font-size="12" font-weight="600">Provider Layer</text>

  <!-- Context arrows down to sub-modules -->
  <line x1="320" y1="245" x2="200" y2="285" stroke="#d29922" stroke-width="1" marker-end="url(#arrowO)"/>
  <line x1="400" y1="245" x2="400" y2="285" stroke="#d29922" stroke-width="1" marker-end="url(#arrowO)"/>
  <line x1="480" y1="245" x2="600" y2="285" stroke="#d29922" stroke-width="1" marker-end="url(#arrowO)"/>

  <!-- Sub-modules row -->
  <rect x="80" y="285" width="160" height="35" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="160" y="307" text-anchor="middle" fill="#8b949e" font-size="11">file_ops / git / memory</text>

  <rect x="310" y="285" width="180" height="35" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="400" y="307" text-anchor="middle" fill="#8b949e" font-size="11">diff_engine / sessions</text>

  <rect x="540" y="285" width="160" height="35" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="620" y="307" text-anchor="middle" fill="#8b949e" font-size="11">cost_optimizer</text>

  <!-- Provider arrows down to providers -->
  <line x1="580" y1="245" x2="540" y2="355" stroke="#58a6ff" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="640" y1="245" x2="640" y2="355" stroke="#58a6ff" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="700" y1="245" x2="740" y2="355" stroke="#58a6ff" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Providers row -->
  <rect x="460" y="355" width="90" height="32" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="505" y="375" text-anchor="middle" fill="#8b949e" font-size="10">OpenAI</text>

  <rect x="560" y="355" width="90" height="32" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="605" y="375" text-anchor="middle" fill="#8b949e" font-size="10">Anthropic</text>

  <rect x="660" y="355" width="90" height="32" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="705" y="375" text-anchor="middle" fill="#8b949e" font-size="10">Ollama</text>

  <text x="750" y="380" text-anchor="middle" fill="#484f58" font-size="16">+4</text>

  <!-- API Client -->
  <line x1="640" y1="387" x2="640" y2="415" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="540" y="415" width="200" height="35" rx="8" fill="#21262d" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="640" y="437" text-anchor="middle" fill="#c9d1d9" font-size="12" font-weight="600">HTTP Client (httpx)</text>

  <!-- Bottom features bar -->
  <rect x="40" y="475" width="720" height="35" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="400" y="497" text-anchor="middle" fill="#8b949e" font-size="11">plugins  ·  themes  ·  voice  ·  snippets  ·  templates  ·  recorder  ·  eli5  ·  shell completions</text>
</svg>
