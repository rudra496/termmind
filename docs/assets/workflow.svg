<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="step1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#238636"/>
      <stop offset="100%" stop-color="#2ea043"/>
    </linearGradient>
    <linearGradient id="step2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f6feb"/>
      <stop offset="100%" stop-color="#388bfd"/>
    </linearGradient>
    <linearGradient id="step3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8957e5"/>
      <stop offset="100%" stop-color="#a371f7"/>
    </linearGradient>
    <linearGradient id="step4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#da3633"/>
      <stop offset="100%" stop-color="#f85149"/>
    </linearGradient>
  </defs>

  <rect width="800" height="300" rx="12" fill="url(#bg)"/>
  <text x="400" y="35" text-anchor="middle" fill="#c9d1d9" font-size="18" font-weight="700">How TermMind Works</text>

  <!-- Step 1 -->
  <rect x="30" y="70" width="160" height="180" rx="10" fill="#21262d" stroke="url(#step1)" stroke-width="1.5"/>
  <circle cx="110" cy="100" r="16" fill="url(#step1)"/>
  <text x="110" y="105" text-anchor="middle" fill="white" font-size="13" font-weight="700">1</text>
  <text x="110" y="130" text-anchor="middle" fill="#c9d1d9" font-size="12" font-weight="600">Install &amp; Init</text>
  <text x="110" y="155" text-anchor="middle" fill="#8b949e" font-size="10">pip install termmind</text>
  <text x="110" y="172" text-anchor="middle" fill="#8b949e" font-size="10">termmind init</text>
  <text x="110" y="189" text-anchor="middle" fill="#8b949e" font-size="10">Choose provider</text>
  <text x="110" y="206" text-anchor="middle" fill="#8b949e" font-size="10">Set API key</text>

  <!-- Arrow -->
  <line x1="190" y1="160" x2="220" y2="160" stroke="#484f58" stroke-width="2" marker-end="url(#arr2)"/>
  <defs><marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#484f58"/></marker></defs>

  <!-- Step 2 -->
  <rect x="220" y="70" width="160" height="180" rx="10" fill="#21262d" stroke="url(#step2)" stroke-width="1.5"/>
  <circle cx="300" cy="100" r="16" fill="url(#step2)"/>
  <text x="300" y="105" text-anchor="middle" fill="white" font-size="13" font-weight="700">2</text>
  <text x="300" y="130" text-anchor="middle" fill="#c9d1d9" font-size="12" font-weight="600">Chat or Command</text>
  <text x="300" y="155" text-anchor="middle" fill="#8b949e" font-size="10">termmind chat</text>
  <text x="300" y="172" text-anchor="middle" fill="#8b949e" font-size="10">termmind ask "..."</text>
  <text x="300" y="189" text-anchor="middle" fill="#8b949e" font-size="10">termmind edit &lt;file&gt;</text>
  <text x="300" y="206" text-anchor="middle" fill="#8b949e" font-size="10">termmind review &lt;path&gt;</text>

  <!-- Arrow -->
  <line x1="380" y1="160" x2="410" y2="160" stroke="#484f58" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Step 3 -->
  <rect x="410" y="70" width="160" height="180" rx="10" fill="#21262d" stroke="url(#step3)" stroke-width="1.5"/>
  <circle cx="490" cy="100" r="16" fill="url(#step3)"/>
  <text x="490" y="105" text-anchor="middle" fill="white" font-size="13" font-weight="700">3</text>
  <text x="490" y="130" text-anchor="middle" fill="#c9d1d9" font-size="12" font-weight="600">AI Processes</text>
  <text x="490" y="155" text-anchor="middle" fill="#8b949e" font-size="10">Context built</text>
  <text x="490" y="172" text-anchor="middle" fill="#8b949e" font-size="10">auto from files</text>
  <text x="490" y="189" text-anchor="middle" fill="#8b949e" font-size="10">Sent to LLM</text>
  <text x="490" y="206" text-anchor="middle" fill="#8b949e" font-size="10">Streamed response</text>

  <!-- Arrow -->
  <line x1="570" y1="160" x2="600" y2="160" stroke="#484f58" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Step 4 -->
  <rect x="600" y="70" width="170" height="180" rx="10" fill="#21262d" stroke="url(#step4)" stroke-width="1.5"/>
  <circle cx="685" cy="100" r="16" fill="url(#step4)"/>
  <text x="685" y="105" text-anchor="middle" fill="white" font-size="13" font-weight="700">4</text>
  <text x="685" y="130" text-anchor="middle" fill="#c9d1d9" font-size="12" font-weight="600">Result</text>
  <text x="685" y="155" text-anchor="middle" fill="#8b949e" font-size="10">Formatted output</text>
  <text x="685" y="172" text-anchor="middle" fill="#8b949e" font-size="10">Diff preview</text>
  <text x="685" y="189" text-anchor="middle" fill="#8b949e" font-size="10">Cost tracking</text>
  <text x="685" y="206" text-anchor="middle" fill="#8b949e" font-size="10">Session saved</text>
</svg>
